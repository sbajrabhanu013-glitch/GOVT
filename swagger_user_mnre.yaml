        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: type_of_coal
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: towns
        schema:
          type: string
        description: Filter by town type (Statutory towns, Census towns, etc.)
      - in: query
        name: vehicles_registered
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: zone
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
          pattern: ^\d+$
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          pattern: ^\d+$
      - in: query
        name: Format
        required: true
        schema:
          type: string
          default: JSON
          enum:
          - JSON
          - CSV
        description: Output format (JSON or CSV)
      responses:
        '200':
          description: A JSON array of user information
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid request body
            text/csv:
              schema:
                type: object
                properties:
                  statusCode:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid request body
      security:
      - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      description: Bearer token to access these api endpoints
      name: Authorization
      in: header
