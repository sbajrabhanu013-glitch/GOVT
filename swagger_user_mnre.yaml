          type: integer
          pattern: ^\d+(,\d+)*$
        description: API uses typo "lenght" not "length"
      - in: query
        name: major_discipline
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: metalic_mineral_sub_cate
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
        description: API uses typo "metalic" not "metallic"
      - in: query
        name: minerals_category
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: minerals_metal
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
