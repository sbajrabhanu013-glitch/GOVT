openapi: 3.0.1
info:
  title: Environment Statistics
  version: 1.0.0
servers:
- url: https://api.mospi.gov.in/
tags:
- name: Environment Statistics.
  description: Indicator-wise environment statistics in India.
paths:
  /api/env/getEnvStatsRecords:
    get:
      summary: Get data for an indicator
      description: "- **Required:** `indicator_code`  \n- **Filters (optional):**\
        \ All parameters below (without _code suffix, keeping API typos)\n"
      parameters:
      - in: query
        name: indicator_code
        required: true
        schema:
          type: integer
          pattern: ^\d+$
        description: Indicator code (primary filter, single value only)
      - in: query
        name: year
        schema:
          type: string
          pattern: ^\d{4}(,\d{4})*$
      - in: query
        name: wetland_area_type
        schema:
          type: string
        description: Filter by wetland area type (Lake, Tank, etc.)
      - in: query
        name: month
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: quarter
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: state
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: region
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: sector
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: sub_indicator
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: livestock_marine_products
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: area
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: area_type
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: basin
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: broad_discipline
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: carbon_pool
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: causes
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: cities
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: commodity
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: cultivated_area
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: emission_source
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: fertilizer
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: foodgrain
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: fuel_mineral_sub_cate
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: fuel_type
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: foodgrains
        schema:
          type: string
        description: Filter by foodgrains type (Rice, Wheat, etc.)
      - in: query
        name: hazardous_waste
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: land_cover
        schema:
          type: integer
          pattern: ^\d+(,\d+)*$
      - in: query
        name: land_degradation
